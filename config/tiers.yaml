# Model Tiers — Failover Configuration
#
# Each tier lists models in priority order.
# If model #1 fails (rate limit, quota, network), the agent falls back to #2, then #3.
#
# Format: provider/model-id
# Run `opencode models` to see your available models.
#
# For Ollama local models:
#   1. Start Ollama: ollama serve
#   2. Set: export LOCAL_ENDPOINT=http://localhost:11434/v1
#   3. Use: local.modelname (e.g. local.qwen3:32b)
#
# For OpenRouter (built-in failover):
#   Use: openrouter/anthropic/claude-sonnet-4 etc.

tier1_strategic:
  - opencode/big-pickle             # queen, architect — strongest free model
  - opencode/nemotron-3-super-free  # fallback if big-pickle is rate-limited
  - opencode/minimax-m2.5-free      # last resort

tier2_balanced:
  - opencode/nemotron-3-super-free  # sentinel — review tasks
  - opencode/minimax-m2.5-free      # fallback
  - opencode/big-pickle             # escalation fallback

tier3_fast:
  - opencode/minimax-m2.5-free      # scripter, refactor — implementation
  - opencode/qwen3.6-plus-free      # documenter — creative/docs
  - opencode/big-pickle             # escalation fallback
